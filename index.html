<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>面世物流 · 智能运输管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f6fa; font-family: "微软雅黑", "PingFang SC", sans-serif; }
        
        /* 顶部导航栏 - 完全脱敏 */
        .header { 
            background: linear-gradient(135deg, #1F3864 0%, #2F5496 100%);
            color: white; 
            padding: 12px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 9999;
        }
        .header .logo { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        .header .logo span { color: #4FC3F7; }
        .header .nav { display: flex; gap: 20px; }
        .header .nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px; }
        .header .nav a:hover { color: white; }
        .header .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .header .user-info .avatar { 
            width: 32px; height: 32px; border-radius: 50%; 
            background: #4FC3F7; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #1F3864;
        }

        /* 主内容区 */
        .main { margin-top: 56px; height: calc(100vh - 56px); position: relative; }
        
        /* iframe 容器 - 裁剪法隐藏边缘图标 */
        .iframe-container { width: 100%; height: 100%; position: relative; }
        .iframe-cropper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        .iframe-cropper iframe { 
            width: calc(100% + 70px);
            height: calc(100% + 70px);
            border: none; 
            display: block;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #E3F2FD;
            border-top-color: #2F5496;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #666; font-size: 14px; }

        /* 响应式 */
        @media (max-width: 768px) {
            .header .nav { display: none; }
            .header .logo { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航栏（完全脱敏，无秒悟标识） -->
    <div class="header">
        <div class="logo">面世物流 <span>·</span> 智能运输管理系统</div>
        <div class="nav">
            <a href="#" onclick="goHome()">运单查询</a>
            <a href="#" onclick="goTrack()">轨迹追踪</a>
            <a href="#" onclick="goReceipt()">电子回单</a>
        </div>
        <div class="user-info">
            <div class="avatar">客</div>
            <span>客户中心</span>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main">
        <!-- 加载动画 -->
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">系统加载中，请稍候...</div>
        </div>

        <!-- iframe 嵌入秒悟应用（裁剪法隐藏右下角浮动图标） -->
        <div class="iframe-container">
            <div class="iframe-cropper">
                <iframe 
                    id="appFrame"
                    src="https://r0lljgsppr6p.meoo.pub"
                    onload="onIframeLoad()"
                    allow="microphone; camera; geolocation">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // ========== iframe 加载完成 ==========
        function onIframeLoad() {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
        }

        // ========== 导航栏跳转 ==========
        function goHome() {
            document.getElementById('appFrame').contentWindow.postMessage({ type: 'navigate', page: 'home' }, '*');
        }
        function goTrack() {
            document.getElementById('appFrame').contentWindow.postMessage({ type: 'navigate', page: 'track' }, '*');
        }
        function goReceipt() {
            document.getElementById('appFrame').contentWindow.postMessage({ type: 'navigate', page: 'receipt' }, '*');
        }

        // ========== CSS裁剪法已生效 ==========
        // 原理：iframe比容器大70px，右下角的秒悟浮动图标被裁出可视区域
        // 不受跨域限制，100%可靠
        console.log('✓ 面世物流智能运输管理系统已加载');
        console.log('✓ CSS裁剪法已启用，秒悟图标已隐藏');
    </script>
</body>
</html>
